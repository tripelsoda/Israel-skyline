<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Israel Skyline Live</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{
      --bg: #0b0f14;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.10);
      --text: #e8eef6;
      --muted: rgba(232,238,246,.72);
      --shadow: 0 12px 30px rgba(0,0,0,.35);
      --radius: 16px;
      --gap: 14px;
      --accent: #57d3ff;
      --accent2: #7c5cff;
    }

    *{ box-sizing: border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(1200px 800px at 15% -10%, rgba(124,92,255,.20), transparent 60%),
        radial-gradient(1200px 800px at 85% 0%, rgba(87,211,255,.14), transparent 55%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap{ max-width: 1200px; margin: 0 auto; padding: 18px 14px 28px; }

    header{
      display:flex; gap: 12px; align-items:center; justify-content: space-between;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      position: sticky; top: 10px; z-index: 20;
    }

    .brand{ display:flex; flex-direction: column; gap: 4px; }
    .brand .t{ font-size: 16px; font-weight: 800; letter-spacing: .2px; }
    .brand .s{ font-size: 12px; color: var(--muted); }

    .controls{ display:flex; gap: 10px; align-items:center; flex-wrap: wrap; justify-content: flex-end; }
    .pill{
      display:flex; align-items:center; gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.18);
      border-radius: 999px;
      color: var(--text);
    }

    input[type="search"]{
      appearance: none;
      width: min(320px, 72vw);
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 13px;
    }

    .btn{
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform .06s ease, background .2s ease, border-color .2s ease;
      user-select: none;
      display:flex; align-items:center; gap: 8px;
      font-size: 13px;
    }
    .btn:hover{ background: rgba(255,255,255,.10); border-color: rgba(255,255,255,.18); }
    .btn:active{ transform: translateY(1px); }

    /* Make cards bigger: increase min width */
    .grid{
      margin-top: 16px;
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
      gap: 18px;
    }

    .card{
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      display:flex; flex-direction: column;
      min-height: 260px;
    }

    .meta{
      padding: 12px 12px 10px;
      display:flex; align-items:flex-start; justify-content: space-between; gap: 10px;
    }
    .meta .left{ display:flex; flex-direction: column; gap: 4px; min-width: 0; }
    .name{ font-weight: 800; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub{ color: var(--muted); font-size: 12px; display:flex; gap: 10px; flex-wrap: wrap; }

    .tags{ display:flex; gap: 6px; flex-wrap: wrap; }
    .tag{
      font-size: 11px;
      padding: 6px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.16);
      color: rgba(232,238,246,.82);
    }

    .frame{
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      display:block;
      background: rgba(0,0,0,.35);
    }

    .actions{
      padding: 10px 12px 12px;
      display:flex; gap: 10px; justify-content: space-between; align-items:center; flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .actions .left{ display:flex; gap: 10px; flex-wrap: wrap; align-items:center; }
    .hint{ color: var(--muted); font-size: 12px; }

    .small{
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 999px;
    }
    .small.primary{
      border-color: rgba(87,211,255,.35);
      background: linear-gradient(90deg, rgba(87,211,255,.16), rgba(124,92,255,.12));
    }

    .empty{
      margin-top: 18px;
      padding: 18px;
      border-radius: var(--radius);
      border: 1px dashed rgba(255,255,255,.18);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 520px){
      header{ position: static; }
      .controls{ justify-content: flex-start; }
      .grid{ grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="t" id="pageTitle">Israel Skyline Live</div>
        <div class="s" id="pageSubtitle">Loading…</div>
      </div>

      <div class="controls">
        <div class="pill" title="Filter by name, city or tag">
          🔎 <input id="search" type="search" placeholder="Search (city, name, tag)..." />
        </div>

        <button class="btn" id="toggleAutoplay" type="button" title="Toggle autoplay for embeds">
          ▶️ Autoplay: <span id="autoplayState">On</span>
        </button>

        <button class="btn" id="refresh" type="button" title="Reload JSON and re-render">
          🔄 Refresh
        </button>
      </div>
    </header>

    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">No streams match your search.</div>
  </div>

<script>
  const CONFIG_URL = "./lives.json";

  let cfg = null;

  // State (fixed)
  let allCards = [];
  let autoplayEnabled = true;
  let muteEnabled = true;
  let lastError = "";

  function $(id){ return document.getElementById(id); }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function normalizeListOrString(v){
    if (!v) return [];
    if (Array.isArray(v)) return v.map(x => String(x).trim()).filter(Boolean);
    if (typeof v === "string") return v.split(",").map(x => x.trim()).filter(Boolean);
    return [];
  }

  async function fetchConfig() {
    const r = await fetch(CONFIG_URL, { cache: "no-store" });
    if (!r.ok) throw new Error(`Failed to load lives.json (${r.status})`);
    cfg = await r.json();
    if (!cfg) throw new Error("Invalid lives.json");
  }

  function ytEmbedUrl(youtubeId, autoplay, mute) {
    const p = new URLSearchParams({
      autoplay: autoplay ? "1" : "0",
      mute: mute ? "1" : "0",
      playsinline: "1",
      rel: "0",
      modestbranding: "1"
    });
    return `https://www.youtube.com/embed/${encodeURIComponent(youtubeId)}?${p.toString()}`;
  }

  async function resolveDynamic(card) {
    const base = String(cfg.apiBase || "").replace(/\/$/, "");
    if (!base) throw new Error("apiBase is missing in lives.json");
  
    const includeList = normalizeListOrString(card.include);
    const excludeList = normalizeListOrString(card.exclude);
  
    const u = new URL(base + "/");
    u.searchParams.set("channelId", card.channelId);
  
    if (includeList.length) u.searchParams.set("include", includeList.join(","));
    if (excludeList.length) u.searchParams.set("exclude", excludeList.join(","));
  
    // debug AFTER u exists
    console.log("Worker URL:", u.toString());
  
    const r = await fetch(u.toString(), { cache: "no-store" });
    const txt = await r.text();
    if (!r.ok) throw new Error(txt || `Worker error (${r.status})`);
  
    const data = JSON.parse(txt);
    if (!data.videoId) throw new Error("Worker response missing videoId");
  
    return data.videoId;
  } 

  async function buildCards() {
    const defaults = cfg.defaults || {};
    muteEnabled = (defaults.mute ?? true);

    const staticCards = (cfg.staticCards || []).filter(c => c && c.enabled !== false);

    const dynamicRaw = (cfg.dynamicCards || []).filter(c => c && c.enabled !== false);
    const dynamicCards = await Promise.all(dynamicRaw.map(async c => {
      try {
        const videoId = await resolveDynamic(c);
        return { ...c, youtubeId: videoId, _dynamicOk: true };
      } catch (e) {
        return { ...c, youtubeId: null, _dynamicOk: false, _error: String(e) };
      }
    }));

    return [...dynamicCards, ...staticCards];
  }

  function cardMatchesQuery(card, q){
    if (!q) return true;
    const hay = [
      card.name,
      card.city,
      card.id,
      ...(card.tags || [])
    ].filter(Boolean).join(" ").toLowerCase();
    return hay.includes(q);
  }

  function renderCards(cards) {
    const grid = $("grid");
    const empty = $("empty");
    grid.innerHTML = "";

    const q = $("search").value.trim().toLowerCase();
    const visible = cards.filter(c => c && c.enabled !== false).filter(c => cardMatchesQuery(c, q));

    if (!visible.length) {
      empty.style.display = "block";
      empty.textContent = q ? "No streams match your search." : "No streams configured.";
      return;
    }
    empty.style.display = "none";

    for (const c of visible) {
      const node = document.createElement("div");
      node.className = "card";

      const tags = (c.tags || []).slice(0, 6).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("");

      const body = c.youtubeId
        ? `<iframe class="frame"
              src="${ytEmbedUrl(c.youtubeId, autoplayEnabled, muteEnabled)}"
              allow="autoplay; encrypted-media; picture-in-picture"
              loading="lazy"
              allowfullscreen></iframe>`
        : `<div style="padding:14px; color: rgba(232,238,246,.72);">
             Couldn’t resolve live right now.<br/>
             <span style="font-size:12px; opacity:.8">${escapeHtml(c._error || "")}</span>
           </div>`;

      const watchUrl = c.youtubeId ? `https://www.youtube.com/watch?v=${encodeURIComponent(c.youtubeId)}` : "#";

      node.innerHTML = `
        <div class="meta">
          <div class="left">
            <div class="name">${escapeHtml(c.name || c.id || "Live")}</div>
            <div class="sub">
              <span>📍 ${escapeHtml(c.city || "Israel")}</span>
              <span>•</span>
              <span class="hint">${c._dynamicOk === false ? "Auto live (not found)" : (c.channelId ? "Auto live" : "Static")}</span>
            </div>
            <div class="tags">${tags}</div>
          </div>
        </div>
        ${body}
        <div class="actions">
          <div class="left">
            <a class="btn small primary" href="${watchUrl}" target="_blank" rel="noreferrer" ${c.youtubeId ? "" : "aria-disabled=true"}>▶️ Open on YouTube</a>
          </div>
          <div class="hint">${escapeHtml(c.id || "")}</div>
        </div>
      `;

      grid.appendChild(node);
    }
  }

  async function loadAndRender() {
    $("pageSubtitle").textContent = "Loading…";
    lastError = "";

    await fetchConfig();

    $("pageTitle").textContent = cfg.title || "Israel Skyline Live";
    $("pageSubtitle").textContent = cfg.subtitle || "";

    autoplayEnabled = (cfg.defaults?.autoplay ?? true);
    $("autoplayState").textContent = autoplayEnabled ? "On" : "Off";

    allCards = await buildCards();
    renderCards(allCards);
  }

  // Listeners (fixed)
  $("search").addEventListener("input", () => renderCards(allCards));

  $("toggleAutoplay").addEventListener("click", () => {
    autoplayEnabled = !autoplayEnabled;
    $("autoplayState").textContent = autoplayEnabled ? "On" : "Off";
    renderCards(allCards);
  });

  $("refresh").addEventListener("click", async () => {
    try {
      await loadAndRender();
    } catch (err) {
      console.error(err);
      $("pageSubtitle").textContent = "Error";
      $("empty").style.display = "block";
      $("empty").textContent = "Failed to load config or resolve lives. Check lives.json apiBase and Worker.";
    }
  });

  // Start
  loadAndRender().catch(err => {
    console.error(err);
    $("pageSubtitle").textContent = "Error";
    $("empty").style.display = "block";
    $("empty").textContent = "Failed to load config or resolve lives. Check lives.json apiBase and Worker.";
  });
</script>
</body>
</html>
